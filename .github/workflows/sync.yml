name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        run: |
          git push --force https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/psiak/moj-grajek HEAD:main
